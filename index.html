<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://mfdejkzqnnginorvggog.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

    const targetPage = document.getElementById(pageId + 'Page');
    if (!targetPage) {
      console.error('Page not found:', pageId + 'Page');
      return;
    }

    if (['picks'].includes(pageId) && !currentUser) {
      showPage('login');
      showAlert('loginAlert', 'Please login to make picks!', 'error');
      return;
    }

    targetPage.classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-page="${pageId}"]`)?.classList.add('active');

    if (pageId === 'leaderboard') loadLeaderboard();

    if (pageId === 'picks' && currentUser) {
      loadPicksForm();
      loadUserPicks();
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function handleRegister(e) {
    e.preventDefault();

    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!username || !password) {
      showAlert('registerAlert', 'Please fill in all fields', 'error');
      return;
    }

    if (password.length < 4) {
      showAlert('registerAlert', 'Password must be at least 4 characters', 'error');
      return;
    }

    try {
      const { data: existing } = await db
        .from('users')
        .select('username')
        .eq('username', username)
        .maybeSingle();

      if (existing) {
        showAlert('registerAlert', 'Username already taken!', 'error');
        return;
      }

      const { error } = await db
        .from('users')
        .insert({
          username,
          email: username + '@tour.com',
          password,
          points: 0,
          correct_picks: 0
        });

      if (error) throw error;

      showAlert('registerAlert', 'Account created! Please login.', 'success');
      setTimeout(() => showPage('login'), 1500);

    } catch (error) {
      console.error('Registration error:', error);
      showAlert('registerAlert', 'Registration failed. Try again.', 'error');
    }
  }

  async function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
      showAlert('loginAlert', 'Please fill in all fields', 'error');
      return;
    }

    try {
      const { data: user, error } = await db
        .from('users')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .maybeSingle();

      if (error || !user) {
        showAlert('loginAlert', 'Invalid username or password', 'error');
        return;
      }

      currentUser = user;
      localStorage.setItem('tdf_user', JSON.stringify(user));

      updateAuthUI();
      showAlert('loginAlert', 'Welcome back, ' + username + '!', 'success');

      setTimeout(() => showPage('picks'), 1000);

      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';

    } catch (error) {
      console.error('Login error:', error);
      showAlert('loginAlert', 'Login failed. Please try again.', 'error');
    }
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem('tdf_user');
    updateAuthUI();
    showPage('home');
  }

  function updateAuthUI() {
    if (currentUser) {
      document.getElementById('navRegister').style.display = 'none';
      document.getElementById('navLogin').style.display = 'none';
      document.getElementById('navLogout').style.display = 'inline-block';

      let userInfo = document.querySelector('.user-info');

      if (!userInfo) {
        userInfo = document.createElement('div');
        userInfo.className = 'user-info';
        document.getElementById('navLogout').parentNode.insertBefore(
          userInfo,
          document.getElementById('navLogout')
        );
      }

      userInfo.innerHTML = `
        <span class="user-badge">${currentUser.username}</span>
        <span class="points-badge">${currentUser.points || 0} pts</span>
      `;
    } else {
      document.getElementById('navRegister').style.display = 'inline-block';
      document.getElementById('navLogin').style.display = 'inline-block';
      document.getElementById('navLogout').style.display = 'none';

      const userInfo = document.querySelector('.user-info');
      if (userInfo) userInfo.remove();
    }
  }

  function loadPicksForm() {
    const container = document.getElementById('stagesContainer');
    if (!container) return;

    container.innerHTML = stages.map(stage => `
      <div class="stage-card">
        <span class="stage-number">Stage ${stage.number}</span>
        <div class="stage-type">${stage.type} • ${stage.distance}</div>
        <div class="stage-route">${stage.route}</div>
        <select id="stage_${stage.number}" class="form-group" style="width:100%;padding:12px;font-size:0.9rem;background:var(--black);border:2px solid var(--light-gray);border-radius:6px;color:var(--white);">
          <option value="">-- Select Winner --</option>
          ${riders.map(r => `<option value="${r}">${r}</option>`).join('')}
        </select>
      </div>
    `).join('');
  }

  async function submitPicks() {
    if (!currentUser) {
      showAlert('picksAlert', 'Please login first!', 'error');
      return;
    }

    const stagePicks = {};

    stages.forEach(stage => {
      const pick = document.getElementById(`stage_${stage.number}`)?.value;
      if (pick) stagePicks[`stage_${stage.number}`] = pick;
    });

    const gcPick = document.getElementById('gcPick').value;
    const pointsPick = document.getElementById('pointsPick').value;
    const mountainsPick = document.getElementById('mountainsPick').value;
    const youngRiderPick = document.getElementById('youngRiderPick').value;

    const totalPicks =
      Object.keys(stagePicks).length +
      (gcPick ? 1 : 0) +
      (pointsPick ? 1 : 0) +
      (mountainsPick ? 1 : 0) +
      (youngRiderPick ? 1 : 0);

    if (totalPicks === 0) {
      showAlert('picksAlert', 'Please make at least one pick!', 'error');
      return;
    }

    try {
      const { data: existingPicks } = await db
        .from('picks')
        .select('id')
        .eq('user_id', currentUser.id)
        .maybeSingle();

      const picksData = {
        user_id: currentUser.id,
        username: currentUser.username,
        stage_picks: stagePicks,
        gc_pick: gcPick,
        points_pick: pointsPick,
        mountains_pick: mountainsPick,
        young_rider_pick: youngRiderPick,
        submitted_at: new Date().toISOString()
      };

      let result;

      if (existingPicks) {
        result = await db
          .from('picks')
          .update(picksData)
          .eq('user_id', currentUser.id);
      } else {
        result = await db
          .from('picks')
          .insert(picksData);
      }

      if (result.error) throw result.error;

      showAlert('picksAlert', `Successfully saved ${totalPicks} picks!`, 'success');
      loadUserPicks();

    } catch (error) {
      console.error('Submit picks error:', error);
      showAlert('picksAlert', 'Failed to save picks. Please try again.', 'error');
    }
  }

  async function loadUserPicks() {
    if (!currentUser) return;

    try {
      const { data: picks } = await db
        .from('picks')
        .select('*')
        .eq('user_id', currentUser.id)
        .maybeSingle();

      if (!picks) return;

      if (picks.stage_picks) {
        Object.entries(picks.stage_picks).forEach(([key, value]) => {
          const el = document.getElementById(key);
          if (el) el.value = value;
        });
      }

      if (picks.gc_pick) document.getElementById('gcPick').value = picks.gc_pick;
      if (picks.points_pick) document.getElementById('pointsPick').value = picks.points_pick;
      if (picks.mountains_pick) document.getElementById('mountainsPick').value = picks.mountains_pick;
      if (picks.young_rider_pick) document.getElementById('youngRiderPick').value = picks.young_rider_pick;

      displayConfirmedPicks(picks);

    } catch (error) {
      console.log('No existing picks found');
    }
  }

  function displayConfirmedPicks(picks) {
    const container = document.getElementById('confirmedPicks');
    const list = document.getElementById('picksList');

    const allPicks = [];

    if (picks.stage_picks) {
      Object.entries(picks.stage_picks).forEach(([key, value]) => {
        allPicks.push({
          label: key.replace('_', ' ').toUpperCase(),
          value
        });
      });
    }

    if (picks.gc_pick) allPicks.push({ label: 'Yellow Jersey (GC)', value: picks.gc_pick });
    if (picks.points_pick) allPicks.push({ label: 'Green Jersey', value: picks.points_pick });
    if (picks.mountains_pick) allPicks.push({ label: 'Mountains Jersey', value: picks.mountains_pick });
    if (picks.young_rider_pick) allPicks.push({ label: 'White Jersey', value: picks.young_rider_pick });

    if (allPicks.length > 0) {
      list.innerHTML = allPicks.map(pick => `
        <div class="pick-item">
          <span class="pick-label">${pick.label}</span>
          <span class="pick-value">${pick.value}</span>
        </div>
      `).join('');

      container.style.display = 'block';
    }
  }

  async function loadLeaderboard() {
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;">Loading...</td></tr>';

    try {
      const { data: users, error } = await db
        .from('users')
        .select('username, points, correct_picks')
        .order('points', { ascending: false })
        .order('correct_picks', { ascending: false });

      if (error) throw error;

      if (!users || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;">No users yet. Be the first to sign up!</td></tr>';
        return;
      }

      tbody.innerHTML = users.map((user, index) => {
        const rankClass =
          index === 0 ? 'rank-1' :
          index === 1 ? 'rank-2' :
          index === 2 ? 'rank-3' : '';

        const rankEmoji =
          index === 0 ? '🥇' :
          index === 1 ? '🥈' :
          index === 2 ? '🥉' :
          index + 1;

        return `
          <tr>
            <td class="rank-cell ${rankClass}">${rankEmoji}</td>
            <td><strong>${user.username}</strong></td>
            <td>${user.correct_picks || 0}</td>
            <td class="points-cell">${user.points || 0}</td>
          </tr>
        `;
      }).join('');

    } catch (error) {
      console.error('Leaderboard error:', error);
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#FF6B6B;">Failed to load leaderboard</td></tr>';
    }
  }

  function showAlert(elementId, message, type) {
    const el = document.getElementById(elementId);
    if (!el) return;

    el.textContent = message;
    el.className = `alert ${type} show`;

    setTimeout(() => {
      el.classList.remove('show');
    }, 4000);
  }

  async function init() {
    const savedUser = localStorage.getItem('tdf_user');

    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        updateAuthUI();
      } catch {
        localStorage.removeItem('tdf_user');
      }
    }

    loadPicksForm();
  }

  window.showPage = showPage;
  window.logout = logout;
  window.handleRegister = handleRegister;
  window.handleLogin = handleLogin;
  window.submitPicks = submitPicks;

  init();
</script>
